spring.application.name=demo
server.port=9090

# H2 Database Configuration (file-based, persists across restarts)
spring.datasource.url=jdbc:h2:file:./facelens-db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=mySuperSecretKeyForJWTTokenGenerationAndValidationPurposeWithAtLeast64Characters
jwt.expiration=86400000

# File Upload Configuration
app.upload.dir=uploads

# Multipart upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB